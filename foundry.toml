[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = false
evm_version = "cancun"
bytecode_hash = "ipfs"
cbor_metadata = true
remappings = [
  "forge-std/=lib/forge-std/src/",
  "@magics/=src/",
]
fs_permissions = [
  { access = "read", path = "./deployments" },
  { access = "read-write", path = "./deployments" },
]

[profile.ci]
verbosity = 3
fuzz = { runs = 1024 }

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
int_types = "long"
quote_style = "double"
number_underscore = "thousands"

[rpc_endpoints]
base = "${BASE_RPC_URL}"
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"

[etherscan]
base = { key = "${BASESCAN_API_KEY}", url = "https://api.basescan.org/api", chain = 8453 }
base_sepolia = { key = "${BASESCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api", chain = 84532 }
