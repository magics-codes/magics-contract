[toolchain]
anchor_version = "0.31.1"

[features]
resolution = true
skip-lint = false

# Program ids are filled in as each program lands — see `anchor keys list`.
[programs.localnet]

[programs.devnet]

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
